<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kinetix AI | Gemini Live Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; touch-action: manipulation; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(0, 0, 0, 0.05); }
        .live-badge { animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .pulse-btn { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen p-4">

    <header class="text-center mb-6 w-full max-w-2xl">
        <h1 class="text-3xl font-black text-blue-600 tracking-tight">KINETIX <span class="text-slate-400 font-light text-2xl">LIVE</span></h1>
        <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mt-1">Gemini 2.5 Native Audio Engine</p>
    </header>

    <div class="w-full max-w-2xl space-y-4">
        
        <div class="glass-panel p-4 rounded-3xl shadow-sm flex flex-col gap-3">
            <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Session Protocol</label>
            <select id="userMode" class="w-full bg-slate-50 border-none text-slate-800 rounded-2xl p-4 outline-none font-bold shadow-inner">
                <option value="desk">💻 Desk Worker Posture</option>
                <option value="rehab">🦿 Post-Injury Rehab</option>
                <option value="senior">👵 Senior Mobility</option>
                <option value="yoga">🧘‍♂️ Yoga Flow</option>
            </select>
        </div>

        <div class="relative glass-panel rounded-[2rem] overflow-hidden shadow-2xl aspect-[3/4] md:aspect-video bg-black border-4 border-white">
            <video id="userVideo" class="w-full h-full object-cover" autoplay playsinline muted></video>
            <canvas id="hiddenCanvas" class="hidden"></canvas>
            
            <div id="statusIndicator" class="hidden absolute top-4 left-4 flex items-center bg-white/90 px-3 py-1.5 rounded-full shadow-xl">
                <div class="w-2 h-2 bg-red-500 rounded-full live-badge mr-2"></div>
                <span class="text-[10px] font-black text-slate-800 uppercase tracking-tighter">AI Analysis Active</span>
            </div>
        </div>

        <div id="feedbackBox" class="hidden glass-panel p-5 rounded-3xl border-l-8 border-blue-500 animate-in fade-in slide-in-from-bottom-4 duration-500">
            <p id="systemMsg" class="text-blue-700 font-bold text-center italic">Ready to connect...</p>
        </div>

        <button id="startBtn" class="w-full bg-blue-600 text-white font-black text-xl py-6 rounded-[2rem] shadow-xl transition-all active:scale-95 flex items-center justify-center gap-3">
            <i class="fa-solid fa-bolt-lightning"></i> START LIVE SESSION
        </button>
    </div>

    <script>
        const video = document.getElementById('userVideo');
        const canvas = document.getElementById('hiddenCanvas');
        const startBtn = document.getElementById('startBtn');
        const statusIndicator = document.getElementById('statusIndicator');
        const systemMsg = document.getElementById('systemMsg');
        const feedbackBox = document.getElementById('feedbackBox');
        
        let ws, stream, audioContext, processor, playContext;
        let nextPlayTime = 0;
        let imageInterval;
        let isConnected = false;

        // 🔓 فيق الصوت فـ iPhone بمجرد الكليك
        async function unlockAudio() {
            if (!playContext) {
                playContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
            }
            if (playContext.state === 'suspended') {
                await playContext.resume();
            }
        }

        // 🔊 قراءة صوت Gemini (24kHz PCM)
        function playAudioChunk(base64) {
            if (!playContext) return;
            const binary = atob(base64);
            const buffer = new ArrayBuffer(binary.length);
            const view = new DataView(buffer);
            for (let i = 0; i < binary.length; i++) view.setUint8(i, binary.charCodeAt(i));
            
            const int16 = new Int16Array(buffer);
            const float32 = new Float32Array(int16.length);
            for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768.0;

            const audioBuf = playContext.createBuffer(1, float32.length, 24000);
            audioBuf.getChannelData(0).set(float32);

            const source = playContext.createBufferSource();
            source.buffer = audioBuf;
            source.connect(playContext.destination);
            
            const now = playContext.currentTime;
            if (nextPlayTime < now) nextPlayTime = now;
            source.start(nextPlayTime);
            nextPlayTime += audioBuf.duration;
        }

        async function startSession() {
            try {
                await unlockAudio();
                
                feedbackBox.classList.remove('hidden');
                systemMsg.textContent = "INITIALIZING STREAM...";
                
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user', width: 640 }, 
                    audio: true 
                });
                video.srcObject = stream;

                const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
                ws = new WebSocket(`${protocol}//${location.host}/ws`);

                ws.onopen = () => {
                    isConnected = true;
                    systemMsg.textContent = "COACH CONNECTED. START MOVING!";
                    startBtn.innerHTML = '<i class="fa-solid fa-stop"></i> STOP SESSION';
                    startBtn.classList.add('bg-red-500', 'pulse-btn');
                    statusIndicator.classList.remove('hidden');

                    // 🎙️ ميكروفون (16kHz)
                    audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                    const source = audioContext.createMediaStreamSource(stream);
                    processor = audioContext.createScriptProcessor(4096, 1, 1);
                    
                    processor.onaudioprocess = (e) => {
                        if (ws.readyState === WebSocket.OPEN) {
                            const input = e.inputBuffer.getChannelData(0);
                            const pcm16 = new Int16Array(input.length);
                            for (let i = 0; i < input.length; i++) pcm16[i] = input[i] * 32767;
                            const binary = String.fromCharCode(...new Uint8Array(pcm16.buffer));
                            ws.send(JSON.stringify({ audio: btoa(binary) }));
                        }
                    };
                    source.connect(processor);
                    processor.connect(audioContext.destination);

                    // 📸 صور (كل 2 ثواني)
                    imageInterval = setInterval(() => {
                        if (ws.readyState === WebSocket.OPEN) {
                            const ctx = canvas.getContext('2d');
                            canvas.width = 320; canvas.height = 240;
                            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                            ws.send(JSON.stringify({ image: canvas.toDataURL('image/jpeg', 0.4) }));
                        }
                    }, 2000);
                };

                ws.onmessage = (e) => {
                    const data = JSON.parse(e.data);
                    if (data.audio) playAudioChunk(data.audio);
                    if (data.error) systemMsg.textContent = "ERROR: " + data.error;
                };

                ws.onclose = () => cleanup();
                ws.onerror = () => cleanup();

            } catch (err) {
                systemMsg.textContent = "ACCESS DENIED: PLEASE ENABLE CAM/MIC";
                console.error(err);
            }
        }

        function cleanup() {
            if (ws) ws.close();
            if (stream) stream.getTracks().forEach(t => t.stop());
            location.reload(); 
        }

        startBtn.addEventListener('click', () => {
            if (!isConnected) startSession(); else cleanup();
        });
    </script>
</body>
</html>
