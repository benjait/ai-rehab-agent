<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Kinetix | Multimodal Live AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .pulse-ring { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }
        .live-badge { animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 md:p-8">

    <header class="text-center mb-6 w-full max-w-2xl">
        <h1 class="text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300 mb-2">
            <i class="fa-solid fa-bolt text-yellow-400"></i> Gemini Live Agent
        </h1>
        <p class="text-slate-400 text-sm font-medium">Real-time Multimodal Voice & Vision Streaming</p>
    </header>

    <div class="w-full max-w-2xl relative glass-panel rounded-3xl overflow-hidden shadow-2xl aspect-[3/4] md:aspect-video flex items-center justify-center bg-black border border-slate-700">
        <video id="userVideo" class="w-full h-full object-cover" autoplay playsinline muted></video>
        <canvas id="hiddenCanvas" class="hidden"></canvas>
        
        <div id="statusIndicator" class="hidden absolute top-4 left-4 flex items-center bg-black/60 backdrop-blur-md px-4 py-2 rounded-full border border-slate-600">
            <div class="w-3 h-3 bg-red-500 rounded-full live-badge mr-2"></div>
            <span class="text-white text-xs font-bold tracking-widest uppercase">Live Connection</span>
        </div>
    </div>

    <div class="mt-8 w-full max-w-2xl text-center">
        <button id="startBtn" class="w-full md:w-auto bg-gradient-to-r from-blue-600 to-cyan-500 hover:from-blue-500 hover:to-cyan-400 text-white font-bold text-xl py-4 px-12 rounded-full shadow-lg transition-all transform hover:scale-105">
            <i class="fa-solid fa-microphone-lines mr-2"></i> Connect to AI Coach
        </button>
        <p id="systemMsg" class="mt-4 text-slate-400 text-sm font-medium h-6"></p>
    </div>

    <script>
        const video = document.getElementById('userVideo');
        const canvas = document.getElementById('hiddenCanvas');
        const startBtn = document.getElementById('startBtn');
        const statusIndicator = document.getElementById('statusIndicator');
        const systemMsg = document.getElementById('systemMsg');
        
        let ws;
        let stream;
        let audioContext;
        let processor;
        let playContext;
        let nextPlayTime = 0;
        let imageInterval;
        let isConnected = false;

        // دالة تشغيل الصوت الحقيقي ديال Gemini (24kHz PCM)
        function playGeminiAudio(base64String) {
            if (!playContext) {
                playContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
            }
            if (playContext.state === 'suspended') playContext.resume();
            
            const binaryString = atob(base64String);
            const buffer = new ArrayBuffer(binaryString.length);
            const view = new DataView(buffer);
            for (let i = 0; i < binaryString.length; i++) { view.setUint8(i, binaryString.charCodeAt(i)); }
            
            const int16Array = new Int16Array(buffer);
            const float32Array = new Float32Array(int16Array.length);
            for (let i = 0; i < int16Array.length; i++) { float32Array[i] = int16Array[i] / 32768.0; }

            const audioBuffer = playContext.createBuffer(1, float32Array.length, 24000);
            audioBuffer.getChannelData(0).set(float32Array);

            const source = playContext.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(playContext.destination);
            
            const currentTime = playContext.currentTime;
            if (nextPlayTime < currentTime) nextPlayTime = currentTime;
            source.start(nextPlayTime);
            nextPlayTime += audioBuffer.duration;
        }

        async function startLiveSession() {
            try {
                systemMsg.textContent = "Requesting camera and microphone...";
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: true });
                video.srcObject = stream;

                systemMsg.textContent = "Connecting to Gemini Live Servers...";
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                ws = new WebSocket(`${protocol}//${window.location.host}/ws`);

                ws.onopen = () => {
                    isConnected = true;
                    systemMsg.textContent = "Connected! Start talking and moving.";
                    startBtn.innerHTML = '<i class="fa-solid fa-phone-slash mr-2"></i> End Session';
                    startBtn.className = "w-full md:w-auto bg-red-600 hover:bg-red-500 text-white font-bold text-xl py-4 px-12 rounded-full shadow-lg transition-all pulse-ring";
                    statusIndicator.classList.remove('hidden');

                    // 1. التقاط المايكروفون وإرسال الصوت (16kHz PCM)
                    audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                    const source = audioContext.createMediaStreamSource(stream);
                    processor = audioContext.createScriptProcessor(4096, 1, 1);
                    
                    processor.onaudioprocess = (e) => {
                        if (ws.readyState === WebSocket.OPEN) {
                            const inputData = e.inputBuffer.getChannelData(0);
                            const pcm16 = new Int16Array(inputData.length);
                            for (let i = 0; i < inputData.length; i++) {
                                pcm16[i] = Math.max(-1, Math.min(1, inputData[i])) * 32767;
                            }
                            const buffer = new Uint8Array(pcm16.buffer);
                            let binary = '';
                            for (let i = 0; i < buffer.byteLength; i++) { binary += String.fromCharCode(buffer[i]); }
                            ws.send(JSON.stringify({ audio: btoa(binary) }));
                        }
                    };
                    
                    const gainNode = audioContext.createGain();
                    gainNode.gain.value = 0; // باش ما تسمعش صوتك كيتعاود
                    source.connect(processor);
                    processor.connect(gainNode);
                    gainNode.connect(audioContext.destination);

                    // 2. إرسال صورة كل ثانية
                    imageInterval = setInterval(() => {
                        if (ws.readyState === WebSocket.OPEN) {
                            const context = canvas.getContext('2d');
                            canvas.width = video.videoWidth;
                            canvas.height = video.videoHeight;
                            context.drawImage(video, 0, 0, canvas.width, canvas.height);
                            // ضغط الصورة باش تمشي بالزربة
                            const imageData = canvas.toDataURL('image/jpeg', 0.4);
                            ws.send(JSON.stringify({ image: imageData }));
                        }
                    }, 1500);
                };

                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    if (data.audio) {
                        playGeminiAudio(data.audio);
                    }
                };

                ws.onclose = () => { stopLiveSession(); systemMsg.textContent = "Connection closed."; };

            } catch (err) {
                console.error(err);
                systemMsg.textContent = "Error: Please allow Camera & Mic access.";
            }
        }

        function stopLiveSession() {
            if (ws) ws.close();
            if (stream) stream.getTracks().forEach(t => t.stop());
            if (audioContext) audioContext.close();
            if (processor) processor.disconnect();
            clearInterval(imageInterval);
            
            video.srcObject = null;
            isConnected = false;
            
            startBtn.innerHTML = '<i class="fa-solid fa-microphone-lines mr-2"></i> Connect to AI Coach';
            startBtn.className = "w-full md:w-auto bg-gradient-to-r from-blue-600 to-cyan-500 hover:from-blue-500 hover:to-cyan-400 text-white font-bold text-xl py-4 px-12 rounded-full shadow-lg transition-all transform hover:scale-105";
            statusIndicator.classList.add('hidden');
        }

        startBtn.addEventListener('click', () => {
            if (!isConnected) { startLiveSession(); } else { stopLiveSession(); }
        });
    </script>
</body>
</html>
