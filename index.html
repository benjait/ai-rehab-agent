<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Kinetix AI | Smart Physio Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background-color: #f8fafc; color: #0f172a; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(0, 0, 0, 0.08); }
        .pulse-ring { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen p-4 md:p-8">

    <header class="text-center mb-8 w-full max-w-3xl">
        <h1 class="text-4xl font-extrabold text-blue-600 mb-2">
            <i class="fa-solid fa-wave-square text-blue-500"></i> Kinetix AI Agent
        </h1>
        <p class="text-slate-500 text-sm md:text-base font-medium">Real-time Multimodal Physio & Fitness Companion powered by Gemini</p>
    </header>

    <div class="w-full max-w-3xl grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="col-span-1 flex flex-col gap-4">
            <div class="glass-panel p-5 rounded-2xl shadow-sm">
                <label class="block text-slate-700 text-sm font-bold mb-3 uppercase tracking-wider">Select Session Type</label>
                <div class="space-y-2">
                    <select id="userMode" class="w-full bg-slate-50 border border-slate-300 text-slate-800 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 appearance-none font-medium">
                        <option value="desk">💻 Desk Worker Posture</option>
                        <option value="rehab">🦿 Post-Injury Rehab</option>
                        <option value="senior">👵 Senior Care & Mobility</option>
                        <option value="yoga">🧘‍♂️ Yoga & Flexibility</option>
                    </select>
                </div>
            </div>

            <button id="startBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold text-lg py-4 rounded-2xl shadow-md transition-all transform hover:scale-105 flex items-center justify-center gap-2">
                <i class="fa-solid fa-play"></i> <span>Start Session</span>
            </button>

            <div id="feedbackBox" class="glass-panel p-5 rounded-2xl shadow-sm hidden flex-col justify-center items-center text-center border-l-4 border-blue-500 min-h-[120px] bg-blue-50/50">
                <i class="fa-solid fa-comment-medical text-2xl text-blue-500 mb-2"></i>
                <p id="feedbackText" class="text-slate-800 font-semibold text-sm">AI Coach is analyzing...</p>
            </div>
        </div>

        <div class="col-span-1 md:col-span-2 relative glass-panel rounded-3xl overflow-hidden shadow-lg aspect-[4/3] md:aspect-video flex items-center justify-center bg-black">
            <video id="userVideo" class="w-full h-full object-cover" autoplay playsinline muted></video>
            <canvas id="hiddenCanvas" class="hidden"></canvas>
            
            <div id="recordingIndicator" class="hidden absolute top-4 left-4 flex items-center bg-white/90 backdrop-blur-md px-3 py-1.5 rounded-full shadow-sm">
                <div class="w-3 h-3 bg-red-500 rounded-full animate-pulse mr-2"></div>
                <span class="text-slate-800 text-xs font-bold tracking-wide">LIVE ANALYSIS</span>
            </div>
        </div>
    </div>

    <div id="reportModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4">
        <div class="glass-panel rounded-3xl p-8 max-w-md w-full shadow-2xl relative transform transition-all scale-100 bg-white">
            <button id="closeModalBtn" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 text-xl"><i class="fa-solid fa-xmark"></i></button>
            
            <div class="text-center mb-6">
                <div class="inline-block p-4 rounded-full bg-blue-100 mb-3">
                    <i class="fa-solid fa-trophy text-4xl text-blue-500"></i>
                </div>
                <h2 class="text-2xl font-bold text-slate-800">Session Complete!</h2>
                <p class="text-slate-500 text-sm mt-1">Here is your AI-generated summary.</p>
            </div>

            <div class="space-y-4">
                <div class="bg-slate-50 p-4 rounded-xl flex items-center justify-between border border-slate-200">
                    <span class="text-slate-700 font-bold"><i class="fa-solid fa-star text-yellow-500 mr-2"></i>Overall Score</span>
                    <span id="reportScore" class="text-2xl font-black text-blue-600">--/10</span>
                </div>
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                    <h3 class="text-green-600 text-sm font-bold mb-1"><i class="fa-solid fa-arrow-trend-up mr-1"></i> Strengths</h3>
                    <p id="reportStrengths" class="text-slate-700 text-sm font-medium">Loading...</p>
                </div>
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                    <h3 class="text-orange-600 text-sm font-bold mb-1"><i class="fa-solid fa-bullseye mr-1"></i> Areas to Improve</h3>
                    <p id="reportImprovements" class="text-slate-700 text-sm font-medium">Loading...</p>
                </div>
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                    <h3 class="text-blue-600 text-sm font-bold mb-1"><i class="fa-solid fa-forward-step mr-1"></i> Next Step</h3>
                    <p id="reportNext" class="text-slate-700 text-sm font-medium">Loading...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('userVideo');
        const canvas = document.getElementById('hiddenCanvas');
        const startBtn = document.getElementById('startBtn');
        const indicator = document.getElementById('recordingIndicator');
        const feedbackBox = document.getElementById('feedbackBox');
        const feedbackText = document.getElementById('feedbackText');
        const userMode = document.getElementById('userMode');
        const reportModal = document.getElementById('reportModal');
        
        let isRecording = false;
        let analyzeInterval;
        let sessionHistory = []; 

        function speakFeedback(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'en-US';
                msg.rate = 1.0;
                window.speechSynthesis.speak(msg);
            }
        }

        async function captureAndAnalyze() {
            if (!isRecording) return;
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imageData = canvas.toDataURL('image/jpeg', 0.5);
            
            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: imageData, mode: userMode.value })
                });
                
                const result = await response.json();
                if (result.feedback) {
                    feedbackText.textContent = result.feedback;
                    sessionHistory.push(result.feedback); 
                    speakFeedback(result.feedback);
                }
            } catch (error) {
                console.error("Analysis Error:", error);
            }
        }

        async function generateFinalReport() {
            reportModal.classList.remove('hidden');
            document.getElementById('reportScore').textContent = "...";
            document.getElementById('reportStrengths').textContent = "Analyzing session data...";
            document.getElementById('reportImprovements').textContent = "Analyzing session data...";
            document.getElementById('reportNext').textContent = "Analyzing session data...";

            try {
                const response = await fetch('/report', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ history: sessionHistory })
                });
                const report = await response.json();
                
                document.getElementById('reportScore').textContent = report.score || "N/A";
                document.getElementById('reportStrengths').textContent = report.strengths || "No data.";
                document.getElementById('reportImprovements').textContent = report.improvements || "No data.";
                document.getElementById('reportNext').textContent = report.next_step || "Rest and recover.";
            } catch (error) {
                console.error("Report Error:", error);
                document.getElementById('reportStrengths').textContent = "Failed to generate report.";
            }
        }

        startBtn.addEventListener('click', async () => {
            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                    video.srcObject = stream;
                    
                    sessionHistory = []; 
                    startBtn.innerHTML = '<i class="fa-solid fa-stop"></i> <span>End Session & Get Report</span>';
                    startBtn.className = "w-full bg-red-500 hover:bg-red-600 text-white font-bold text-lg py-4 rounded-2xl shadow-md transition-all transform hover:scale-105 flex items-center justify-center gap-2 pulse-ring";
                    
                    indicator.classList.remove('hidden');
                    feedbackBox.classList.remove('hidden');
                    feedbackBox.classList.add('flex');
                    feedbackText.textContent = "Great! Let's check your form...";
                    userMode.disabled = true;
                    isRecording = true;

                    analyzeInterval = setInterval(captureAndAnalyze, 6000); 
                    
                } catch (err) {
                    alert("Please allow camera access to use the AI Agent.");
                }
            } else {
                const tracks = video.srcObject.getTracks();
                tracks.forEach(track => track.stop());
                video.srcObject = null;
                clearInterval(analyzeInterval);
                
                startBtn.innerHTML = '<i class="fa-solid fa-play"></i> <span>Start New Session</span>';
                startBtn.className = "w-full bg-blue-600 hover:bg-blue-700 text-white font-bold text-lg py-4 rounded-2xl shadow-md transition-all transform hover:scale-105 flex items-center justify-center gap-2";
                indicator.classList.add('hidden');
                userMode.disabled = false;
                isRecording = false;
                feedbackText.textContent = "Session ended. Generating report...";
                
                await generateFinalReport();
            }
        });

        document.getElementById('closeModalBtn').addEventListener('click', () => {
            reportModal.classList.add('hidden');
            feedbackBox.classList.add('hidden');
            feedbackBox.classList.remove('flex');
        });
    </script>
</body>
</html>
