<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kinetix AI Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background: #f0f4f8; overflow: hidden; }
        .live-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.5); } 70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl overflow-hidden p-6 space-y-6">
        <h1 class="text-2xl font-black text-center text-blue-600 tracking-tighter italic">KINETIX AI LIVE</h1>
        
        <div class="relative rounded-[2rem] overflow-hidden bg-black aspect-[3/4] shadow-inner border-4 border-slate-100">
            <video id="v" class="w-full h-full object-cover" autoplay playsinline muted></video>
            <canvas id="c" class="hidden"></canvas>
            <div id="ind" class="hidden absolute top-4 left-4 bg-red-500 text-white text-[10px] font-bold px-2 py-1 rounded-full animate-pulse">LIVE</div>
        </div>

        <button id="btn" class="w-full bg-blue-600 text-white font-bold py-5 rounded-2xl shadow-lg active:scale-95 transition-all flex items-center justify-center gap-3">
            <i class="fa-solid fa-microphone"></i> START COACHING
        </button>
        
        <p id="msg" class="text-center text-slate-400 text-xs font-medium italic">Ready to connect...</p>
    </div>

    <script>
        const v = document.getElementById('v'), c = document.getElementById('c'), btn = document.getElementById('btn'), msg = document.getElementById('msg'), ind = document.getElementById('ind');
        let ws, stream, aCtx, pCtx, nextTime = 0, imgInt, isOn = false;

        // 🔓 iPhone Audio Unlock
        async function unlock() {
            if (!pCtx) pCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
            if (pCtx.state === 'suspended') await pCtx.resume();
        }

        function play(b64) {
            if (!pCtx) return;
            const bin = atob(b64), buf = new ArrayBuffer(bin.length), view = new DataView(buf);
            for (let i = 0; i < bin.length; i++) view.setUint8(i, bin.charCodeAt(i));
            const i16 = new Int16Array(buf), f32 = new Float32Array(i16.length);
            for (let i = 0; i < i16.length; i++) f32[i] = i16[i] / 32768.0;
            const aBuf = pCtx.createBuffer(1, f32.length, 24000);
            aBuf.getChannelData(0).set(f32);
            const src = pCtx.createBufferSource();
            src.buffer = aBuf; src.connect(pCtx.destination);
            const now = pCtx.currentTime; if (nextTime < now) nextTime = now;
            src.start(nextTime); nextTime += aBuf.duration;
        }

        async function start() {
            try {
                await unlock();
                msg.textContent = "Connecting to Gemini...";
                stream = await navigator.mediaDevices.getUserMedia({ video: { width: 320 }, audio: true });
                v.srcObject = stream;

                ws = new WebSocket(`${location.protocol==='https:'?'wss:':'ws:'}//${location.host}/ws`);
                ws.onopen = () => {
                    isOn = true; ind.classList.remove('hidden');
                    btn.innerHTML = '<i class="fa-solid fa-stop"></i> STOP';
                    btn.classList.add('bg-red-500', 'live-pulse');
                    msg.textContent = "Connected! Wait for Coach to greet you.";

                    // Mic (16kHz)
                    aCtx = new AudioContext({ sampleRate: 16000 });
                    const src = aCtx.createMediaStreamSource(stream), proc = aCtx.createScriptProcessor(4096, 1, 1);
                    proc.onaudioprocess = (e) => {
                        if (ws.readyState === 1) {
                            const pcm16 = new Int16Array(e.inputBuffer.getChannelData(0).length);
                            for (let i = 0; i < pcm16.length; i++) pcm16[i] = e.inputBuffer.getChannelData(0)[i] * 32767;
                            ws.send(JSON.stringify({ audio: btoa(String.fromCharCode(...new Uint8Array(pcm16.buffer))) }));
                        }
                    };
                    src.connect(proc); proc.connect(aCtx.destination);

                    // Image (Optimized for Mobile)
                    imgInt = setInterval(() => {
                        if (ws.readyState === 1) {
                            const ctx = c.getContext('2d'); c.width = 160; c.height = 120;
                            ctx.drawImage(v, 0, 0, 160, 120);
                            ws.send(JSON.stringify({ image: c.toDataURL('image/jpeg', 0.2) }));
                        }
                    }, 2500); // كل 2.5 ثواني باش ما يتقطعش الويفي
                };
                ws.onmessage = (e) => { const d = JSON.parse(e.data); if (d.audio) play(d.audio); };
                ws.onclose = () => stop();
            } catch (err) { msg.textContent = "Error: Enable Mic/Cam"; }
        }

        function stop() { location.reload(); }

        btn.addEventListener('click', () => { if (!isOn) start(); else stop(); });
    </script>
</body>
</html>
