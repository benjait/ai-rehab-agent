<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>AI Physio Coach | كوتش الترويض الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex flex-col items-center justify-center min-h-screen p-4">

    <div class="text-center mb-6">
        <h1 class="text-3xl font-bold text-blue-600 mb-2">الكوتش الذكي 💪</h1>
        <p class="text-gray-500">رفيقك فالعلاج الطبيعي والرياضة (مدعوم بـ Gemini)</p>
    </div>

    <div class="relative bg-black rounded-2xl overflow-hidden shadow-xl w-full max-w-md aspect-[3/4] mb-6 border-4 border-white">
        <video id="userVideo" class="w-full h-full object-cover" autoplay playsinline muted></video>
        <div id="recordingIndicator" class="hidden absolute top-4 right-4 flex items-center bg-black/50 px-3 py-1 rounded-full">
            <div class="w-3 h-3 bg-red-500 rounded-full animate-pulse mr-2"></div>
            <span class="text-white text-sm mr-2">خدام...</span>
        </div>
    </div>

    <button id="startBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold text-xl py-4 px-12 rounded-full shadow-lg transition duration-300 transform hover:scale-105">
        🎤 بدأ الحصة
    </button>

    <div id="feedbackBox" class="mt-8 bg-white p-4 rounded-xl shadow-md w-full max-w-md text-center hidden border-l-4 border-green-500">
        <p id="feedbackText" class="text-gray-800 font-medium"></p>
    </div>

    <script>
        const video = document.getElementById('userVideo');
        const startBtn = document.getElementById('startBtn');
        const indicator = document.getElementById('recordingIndicator');
        const feedbackBox = document.getElementById('feedbackBox');
        const feedbackText = document.getElementById('feedbackText');
        let isRecording = false;

        startBtn.addEventListener('click', async () => {
            if (!isRecording) {
                try {
                    // طلب صلاحية الكاميرا والميكرو
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                    video.srcObject = stream;
                    
                    // تغيير شكل الزر
                    startBtn.textContent = "🛑 حبس الحصة";
                    startBtn.classList.replace('bg-blue-600', 'bg-red-600');
                    startBtn.classList.replace('hover:bg-blue-700', 'hover:bg-red-700');
                    indicator.classList.remove('hidden');
                    isRecording = true;

                    // إظهار رسالة ترحيبية
                    feedbackBox.classList.remove('hidden');
                    feedbackText.textContent = "الكوتش كيشوفك دابا... بدا الحركات ديالك!";
                    
                } catch (err) {
                    alert("عافاك عطي الصلاحية للكاميرا والميكرو باش يخدم الكوتش!");
                }
            } else {
                // حبس الكاميرا
                const tracks = video.srcObject.getTracks();
                tracks.forEach(track => track.stop());
                video.srcObject = null;
                
                // إرجاع الزر لشكله الأصلي
                startBtn.textContent = "🎤 بدأ الحصة";
                startBtn.classList.replace('bg-red-600', 'bg-blue-600');
                startBtn.classList.replace('hover:bg-red-700', 'hover:bg-blue-700');
                indicator.classList.add('hidden');
                isRecording = false;
                feedbackText.textContent = "الحصة سالات. تبارك الله عليك!";
            }
        });
    </script>
</body>
</html>
